name: Deploy Smart Campus DX landing page

on:
  push:
    branches: ["master", "claude/landing-page-dark-theme-94n05y"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout light (master)
        uses: actions/checkout@v4
        with:
          ref: master
          path: light-src

      - name: Checkout dark (claude/landing-page-dark-theme-94n05y)
        uses: actions/checkout@v4
        with:
          ref: claude/landing-page-dark-theme-94n05y
          path: dark-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build light
        working-directory: light-src
        run: |
          npm install
          npm run build

      - name: Install & build dark
        working-directory: dark-src
        run: |
          npm install
          npm run build -- --base=/-smart-campus-dx-landing/dark/

      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r light-src/dist/. combined/
          mkdir -p combined/dark
          cp -r dark-src/dist/. combined/dark/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
